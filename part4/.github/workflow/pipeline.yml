name:  Blog backend deployment

on:
  push:
    branches:
      - main

jobs:

  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: install deps
        run: npm install

      - name: run lint
        run: npm run lint

      - name: run test
        run: npm test

      - name: build 
        run: npm run build
    
  deploy: 
    needs: build_and_test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with: 
          node-version: '24'

      - name: install deps
        run: npm install